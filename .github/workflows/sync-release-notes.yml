name: Sync release notes

# Keeps every release consistent: on publish (or manual dispatch) the release
# title becomes "WeekBox vX.Y.Z" and the description is pulled from that
# version's section in CHANGELOG.md. Add the changelog entry BEFORE releasing.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to sync (e.g. v1.5.5)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Sync title and notes from CHANGELOG.md
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: node .github/scripts/sync-release-notes.mjs "$RELEASE_TAG"
