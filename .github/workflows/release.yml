name: Build release assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

    steps:
      - name: Check out the release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore Neutralino runtime
        run: npx @neutralinojs/neu update

      - name: Build embedded executables
        run: npm run build

      - name: Package platform archives
        shell: pwsh
        run: |
          $version = (Get-Content neutralino.config.json -Raw | ConvertFrom-Json).version
          if ($env:RELEASE_TAG -ne "v$version") {
            throw "Release tag $env:RELEASE_TAG does not match app version $version."
          }

          $assets = @{
            'WeekBox-linux_arm64' = "WeekBox-$version-linux-arm64.zip"
            'WeekBox-linux_armhf' = "WeekBox-$version-linux-armhf.zip"
            'WeekBox-linux_x64' = "WeekBox-$version-linux-x64.zip"
            'WeekBox-mac_arm64' = "WeekBox-$version-macos-arm64.zip"
            'WeekBox-mac_universal' = "WeekBox-$version-macos-universal.zip"
            'WeekBox-mac_x64' = "WeekBox-$version-macos-x64.zip"
            'WeekBox-win_x64.exe' = "WeekBox-$version-windows-x64.zip"
          }

          New-Item -ItemType Directory -Path dist/release-assets -Force | Out-Null
          foreach ($binary in $assets.Keys) {
            $items = @("dist/WeekBox/$binary", "dist/WeekBox/resources.neu")
            if (Test-Path "dist/WeekBox/extensions") { $items += "dist/WeekBox/extensions" }
            Compress-Archive -LiteralPath $items -DestinationPath "dist/release-assets/$($assets[$binary])" -Force
          }

          Copy-Item "dist/WeekBox/resources.neu" "dist/release-assets/WeekBox-$version-resources.neu" -Force

      - name: Install Inno Setup 7
        shell: pwsh
        run: |
          $url = "https://github.com/jrsoftware/issrc/releases/download/is-7_0_2/innosetup-7.0.2-x86.exe"
          curl.exe -L -o "$env:TEMP\innosetup.exe" $url
          if ((Get-Item "$env:TEMP\innosetup.exe").Length -lt 5MB) {
            throw "Inno Setup download was too small and may be corrupted."
          }
          Start-Process "$env:TEMP\innosetup.exe" -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART" -Wait

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = (Get-Content neutralino.config.json -Raw | ConvertFrom-Json).version
          $iscc = Get-ChildItem "C:\Program Files*\Inno Setup 7\ISCC.exe" | Select-Object -First 1
          if (-not $iscc) { throw "Inno Setup 7 (ISCC.exe) was not found after install." }
          & $iscc.FullName /DMyAppVersion=$version installer\weekbox.iss
          Copy-Item "dist/installer/WeekBox-$version-windows-x64-setup.exe" "dist/release-assets/" -Force

      - name: Upload release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          Get-ChildItem dist/release-assets | ForEach-Object {
            gh release upload $env:RELEASE_TAG $_.FullName --clobber
          }
