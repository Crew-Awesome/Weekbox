<div class="mod-manager-overlay" id="mod-manager-modal" style="display: none">
  <div class="mod-manager-content">
    <header class="mod-manager-header">
      <div class="mod-manager-title-group">
        <h2>Mod Manager</h2>
        <button
          class="mod-manager-dependencies-toggle"
          id="mod-manager-dependencies-toggle"
          type="button"
          aria-label="Show Dependencies"
          aria-pressed="false"
        >
          <i class="fa-solid fa-puzzle-piece" aria-hidden="true"></i
          ><span data-hover-label="Dependencies">Mods</span>
        </button>
      </div>
      <label class="mod-manager-search" for="mod-manager-search-input"
        ><i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i
        ><input
          id="mod-manager-search-input"
          type="search"
          placeholder="Search your mods"
          autocomplete="off"
      /></label>
      <div class="mod-manager-header-actions">
        <button
          class="mod-manager-action-btn"
          id="mod-manager-filter-toggle"
          title="Filter and sort"
          aria-label="Filter and sort"
        >
          <i class="fa-solid fa-arrow-down-wide-short" aria-hidden="true"></i>
        </button>
        <button
          class="mod-manager-action-btn"
          id="mod-manager-view-toggle"
          title="Toggle View Mode"
        >
          <i class="fa-solid fa-list"></i>
        </button>
        <button
          class="mod-manager-action-btn mod-manager-close-btn"
          id="mod-manager-close-btn"
          title="Close"
        >
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
    </header>
    <div class="mod-manager-body" id="mod-manager-modal-body"></div>
  </div>
</div>
