<div class="home-container">
    <nav class="home-nav" id="home-nav">
        <div class="nav-title-area">
            <h2>Discover</h2>
        </div>
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="mod-search-input" class="search-input" placeholder="Search mods (e.g. Sonic, Tricky, Indie...)" autocomplete="off">
            <div class="search-dropdown" id="search-dropdown" style="display: none;"></div>
        </div>
    </nav>
    <div class="home-content">
        <section class="carousel-container" id="featured-carousel">
            <div class="carousel-track" id="carousel-track">
                <div style="padding: 40px; color: white;">Loading featured...</div>
            </div>
            <div class="carousel-controls">
                <button class="carousel-btn" id="carousel-prev"><i class="fa-solid fa-chevron-left"></i></button>
                <div class="carousel-dots" id="carousel-dots"></div>
                <button class="carousel-btn" id="carousel-next"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </section>
        
        <section class="mods-section">
            <header class="section-header">
                <h2 id="grid-section-title">Mods</h2>
                <div class="filter-pills" id="grid-filters">
                    <div class="pill-dropdown" id="engine-filter-dropdown">
                        <button class="pill-btn dropdown-trigger" id="engine-filter-trigger">
                            <img id="engine-filter-icon" src="assets/icons/vslice.png" style="width: 14px; height: 14px; object-fit: contain;">
                            <span id="engine-filter-selected">Base Game</span>
                            <i class="fa-solid fa-chevron-down" style="font-size: 0.75rem; margin-left: 4px;"></i>
                        </button>
                        <div class="custom-options-container" id="engine-filter-options">
                            <div class="custom-option selected" data-id="29202">
                                <img src="assets/icons/vslice.png" style="width: 14px; height: 14px; object-fit: contain; margin-right: 8px;"> Base Game
                            </div>
                            <div class="custom-option" data-id="28367">
                                <img src="assets/icons/psych.ico" style="width: 14px; height: 14px; object-fit: contain; margin-right: 8px;"> Psych Engine
                            </div>
                            <div class="custom-option" data-id="34764">
                                <img src="assets/icons/codename.png" style="width: 14px; height: 14px; object-fit: contain; margin-right: 8px;"> Codename
                            </div>
                        </div>
                    </div>
                    
                    <div style="width: 1px; height: 20px; background: var(--border-color); margin: 0 4px;"></div>
                    
                    <button class="pill-btn active filter-type" data-filter="popular">Discover</button>
                    <button class="pill-btn filter-type" data-filter="ripe">Ripe</button>
                    <button class="pill-btn filter-type" data-filter="new">New</button>
                    <button class="pill-btn filter-type" data-filter="updated">Updated</button>
                </div>
            </header>
            
            <div class="grid-layout" id="popular-grid">
                <p style="color: var(--text-muted);">Loading mods from GameBanana...</p>
            </div>
        </section>
    </div>
</div>
