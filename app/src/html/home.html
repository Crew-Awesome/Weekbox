<div class="home-container">
    <nav class="home-nav" id="home-nav">
        <div class="nav-title-area">
            <h2>Discover</h2>
        </div>
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="mod-search-input" class="search-input" placeholder="Search mods (e.g. Sonic, Tricky, Indie...)" autocomplete="off">
            <div class="search-dropdown" id="search-dropdown" style="display: none;"></div>
        </div>
    </nav>
    <div class="home-content">
        <section class="carousel-container" id="featured-carousel">
            <div class="carousel-track" id="carousel-track">
                <div style="padding: 40px; color: white;">Loading featured...</div>
            </div>
            <div class="carousel-controls">
                <button class="carousel-btn" id="carousel-prev"><i class="fa-solid fa-chevron-left"></i></button>
                <div class="carousel-dots" id="carousel-dots"></div>
                <button class="carousel-btn" id="carousel-next"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </section>
        
        <section class="mods-section">
            <header class="section-header">
                <h2 id="grid-section-title">Mods</h2>
                <div class="filter-pills" id="grid-filters">
                    <button class="pill-btn active" data-filter="popular">Discover</button>
                    <button class="pill-btn" data-filter="ripe">Ripe</button>
                    <button class="pill-btn" data-filter="new">New</button>
                    <button class="pill-btn" data-filter="updated">Updated</button>
                </div>
            </header>
            
            <div class="grid-layout" id="popular-grid">
                <p style="color: var(--text-muted);">Loading mods from GameBanana...</p>
            </div>
        </section>
    </div>
</div>
