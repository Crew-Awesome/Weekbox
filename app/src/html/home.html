<div class="home-container">
  <nav class="home-nav" id="home-nav">
    <div class="nav-title-area">
      <h2>Discover</h2>
    </div>
    <div class="search-container">
      <i class="fa-solid fa-magnifying-glass search-icon"></i>
      <input
        type="text"
        id="mod-search-input"
        class="search-input"
        placeholder="Search mods (e.g. Sonic, Tricky, Indie...)"
        autocomplete="off"
      />
      <div
        class="search-dropdown"
        id="search-dropdown"
        style="display: none"
      ></div>
    </div>
  </nav>
  <div class="home-content">
    <section class="carousel-container" id="featured-carousel">
      <div class="carousel-track" id="carousel-track">
        <div style="padding: 40px; color: white">Loading featured...</div>
      </div>
      <div class="carousel-controls">
        <button class="carousel-btn" id="carousel-prev">
          <i class="fa-solid fa-chevron-left"></i>
        </button>
        <div class="carousel-dots" id="carousel-dots"></div>
        <button class="carousel-btn" id="carousel-next">
          <i class="fa-solid fa-chevron-right"></i>
        </button>
      </div>
    </section>

    <section class="mods-section">
      <header class="section-header">
        <h2 id="grid-section-title">Mods</h2>
        <div class="filter-pills" id="grid-filters">
          <div class="pill-dropdown" id="engine-filter-dropdown">
            <button
              class="pill-btn dropdown-trigger"
              id="engine-filter-trigger"
              type="button"
              aria-haspopup="listbox"
              aria-expanded="false"
            >
              <span
                class="filter-engine-icon"
                id="engine-filter-icon"
                aria-hidden="true"
                ><i class="fa-solid fa-layer-group"></i
              ></span>
              <span id="engine-filter-selected">All engines</span>
              <i
                class="fa-solid fa-chevron-down filter-dropdown-chevron"
                aria-hidden="true"
              ></i>
            </button>
            <div
              class="custom-options-container"
              id="engine-filter-options"
              role="listbox"
              aria-label="Engine filter"
            >
              <button
                class="custom-option selected"
                type="button"
                data-category-id=""
                data-label="All engines"
                role="option"
                aria-selected="true"
              >
                <span class="filter-engine-icon" aria-hidden="true"
                  ><i class="fa-solid fa-layer-group"></i></span
                ><span>All engines</span>
              </button>
              <button
                class="custom-option"
                type="button"
                data-category-id="29202"
                data-label="Base Game"
                role="option"
                aria-selected="false"
              >
                <span class="filter-engine-icon" aria-hidden="true"
                  ><img src="assets/icons/vslice.png" alt="" /></span
                ><span>Base Game</span>
              </button>
              <button
                class="custom-option"
                type="button"
                data-category-id="28367"
                data-label="Psych Engine"
                role="option"
                aria-selected="false"
              >
                <span class="filter-engine-icon" aria-hidden="true"
                  ><img src="assets/icons/psych.png" alt="" /></span
                ><span>Psych Engine</span>
              </button>
              <button
                class="custom-option"
                type="button"
                data-category-id="34764"
                data-label="Codename Engine"
                role="option"
                aria-selected="false"
              >
                <span class="filter-engine-icon" aria-hidden="true"
                  ><img src="assets/icons/codename.png" alt="" /></span
                ><span>Codename Engine</span>
              </button>
              <button
                class="custom-option"
                type="button"
                data-category-id="3827"
                data-label="Executables"
                role="option"
                aria-selected="false"
              >
                <span class="filter-engine-icon" aria-hidden="true"
                  ><img src="assets/icons/exe.png" alt="" /></span
                ><span>Executables</span>
              </button>
              <button class="custom-option" type="button" data-category-id="43798" data-label="P-Slice" role="option" aria-selected="false">
                <span class="filter-engine-icon" aria-hidden="true"><img src="assets/icons/pslice.png" alt="" /></span><span>P-Slice</span>
              </button>
              <button class="custom-option" type="button" data-category-id="44037" data-label="ALE Psych" role="option" aria-selected="false">
                <span class="filter-engine-icon" aria-hidden="true"><img src="assets/icons/alepsych.png" alt="" /></span><span>ALE Psych</span>
              </button>
              <button class="custom-option" type="button" data-category-id="43850" data-label="FPS Plus" role="option" aria-selected="false">
                <span class="filter-engine-icon" aria-hidden="true"><img src="assets/icons/fpsplus.png" alt="" /></span><span>FPS Plus</span>
              </button>
              <button class="custom-option" type="button" data-category-id="43788" data-label="Psych Online" role="option" aria-selected="false">
                <span class="filter-engine-icon" aria-hidden="true"><img src="assets/icons/psychonline.png" alt="" /></span><span>Psych Online</span>
              </button>
            </div>
          </div>

          <div class="pill-dropdown" id="sort-filter-dropdown">
            <button
              class="pill-btn dropdown-trigger"
              id="sort-filter-trigger"
              type="button"
              aria-haspopup="listbox"
              aria-expanded="false"
            >
              <i
                class="fa-solid fa-arrow-down-wide-short"
                aria-hidden="true"
              ></i>
              <span id="sort-filter-selected">Discovery (NEW)</span>
              <i
                class="fa-solid fa-chevron-down filter-dropdown-chevron"
                aria-hidden="true"
              ></i>
            </button>
            <div
              class="custom-options-container"
              id="sort-filter-options"
              role="listbox"
              aria-label="Mod order"
            >
              <button
                class="custom-option"
                type="button"
                data-filter="ripe"
                data-label="Ripe"
                role="option"
                aria-selected="false"
              >
                Ripe
              </button>
              <button
                class="custom-option selected"
                type="button"
                data-filter="popular"
                data-label="Discovery (NEW)"
                role="option"
                aria-selected="true"
              >
                Discovery (NEW)
              </button>
              <button
                class="custom-option"
                type="button"
                data-filter="new"
                data-label="New"
                role="option"
                aria-selected="false"
              >
                New
              </button>
              <button
                class="custom-option"
                type="button"
                data-filter="updated"
                data-label="Updated"
                role="option"
                aria-selected="false"
              >
                Updated
              </button>
            </div>
          </div>
        </div>
      </header>

      <div class="grid-layout" id="popular-grid">
        <p style="color: var(--text-muted)">Loading mods from GameBanana...</p>
      </div>
    </section>
  </div>
</div>
