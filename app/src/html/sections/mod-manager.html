<div class="mod-manager-overlay" id="mod-manager-modal" style="display: none">
  <div class="mod-manager-content">
    <header class="mod-manager-header">
      <div class="mod-manager-title-group">
        <h2>Mod Manager</h2>
        <div
          class="mod-manager-view-tabs"
          role="group"
          aria-label="Mod manager content"
        >
          <button
            class="mod-manager-view-tab active"
            type="button"
            data-mod-manager-view="mods"
            aria-pressed="true"
          >
            Mods
          </button>
          <button
            class="mod-manager-view-tab"
            type="button"
            data-mod-manager-view="dependencies"
            aria-pressed="false"
          >
            Dependencies
          </button>
        </div>
      </div>
      <div class="mod-manager-header-actions">
        <div class="mod-manager-filter" id="mod-manager-engine-filter">
          <button
            class="mod-manager-filter-trigger"
            type="button"
            aria-expanded="false"
          >
            <span class="mod-manager-filter-icon" aria-hidden="true"
              ><i class="fa-solid fa-layer-group"></i
            ></span>
            <span class="mod-manager-filter-label">All mods</span>
            <i class="fa-solid fa-chevron-down" aria-hidden="true"></i>
          </button>
          <div class="mod-manager-filter-menu" role="menu" hidden></div>
        </div>
        <button
          class="mod-manager-action-btn"
          id="mod-manager-view-toggle"
          title="Toggle View Mode"
        >
          <i class="fa-solid fa-list"></i>
        </button>
        <button
          class="mod-manager-action-btn mod-manager-close-btn"
          id="mod-manager-close-btn"
          title="Close"
        >
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
    </header>
    <div class="mod-manager-body" id="mod-manager-modal-body"></div>
  </div>
</div>
